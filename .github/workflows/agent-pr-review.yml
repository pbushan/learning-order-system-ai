name: Agent PR Review

on:
  pull_request_target:
    types:
      - opened
      # Re-review on every push to an open PR.
      - synchronize
      - reopened
      - ready_for_review

concurrency:
  group: agent-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: write

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.AGENT_APP_ID }}
          private-key: ${{ secrets.AGENT_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-pull-requests: write
          permission-issues: write
          permission-contents: read
          permission-checks: write

      - name: Check out base repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Run formal app review
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MODEL: ${{ vars.AGENT_REVIEW_MODEL }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          GITHUB_API_URL: ${{ github.api_url }}
        run: node .github/agent-review/review-pr.mjs

      - name: Upload structured review artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-review-result
          path: agent-review-result.json
          if-no-files-found: ignore
