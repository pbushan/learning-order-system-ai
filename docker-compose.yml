services:
  mysql:
    image: mysql:8.4
    container_name: learning-mysql
    environment:
      MYSQL_DATABASE: learning_orders
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppass
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uappuser -papppass"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: learning-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 10

  localstack:
    image: localstack/localstack:3.8
    container_name: learning-localstack
    environment:
      SERVICES: lambda
      AWS_DEFAULT_REGION: us-east-1
      DEBUG: 0
    ports:
      - "4566:4566"
    volumes:
      - ./order-api/localstack/init:/etc/localstack/init/ready.d
      - ./order-pricing-lambda:/opt/lambda-src
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "bash", "-c", "curl -fs http://localhost:4566/_localstack/health | grep -q '\"lambda\": \"running\"'"]
      interval: 10s
      timeout: 5s
      retries: 20

  github-mcp:
    image: ghcr.io/github/github-mcp-server:latest
    container_name: learning-github-mcp
    command: ["http", "--port", "8082"]
    environment:
      GITHUB_PERSONAL_ACCESS_TOKEN: ${APP_GITHUB_TOKEN}
      GITHUB_TOOLSETS: issues,labels,pull_requests
    restart: unless-stopped

  order-api:
    build:
      context: ./order-api
      dockerfile: Dockerfile
    container_name: learning-order-api
    env_file:
      - .env
    environment:
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
      APP_GITHUB_TOKEN: ${APP_GITHUB_TOKEN}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/learning_orders?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: appuser
      SPRING_DATASOURCE_PASSWORD: apppass
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      APP_LAMBDA_ENDPOINT: http://localstack:4566
      APP_LAMBDA_REGION: us-east-1
      APP_LAMBDA_FUNCTION_NAME: shipping-rule-lambda
      APP_GITHUB_PROVIDER: ${APP_GITHUB_PROVIDER:-mcp}
      APP_GITHUB_MCP_BASE_URL: ${APP_GITHUB_MCP_BASE_URL:-http://github-mcp:8082}
      APP_GITHUB_REPOSITORY: ${APP_GITHUB_REPOSITORY:-pbushan/learning-order-system-ai}
      APP_STEP5_REPO_ROOT: /workspace
      APP_STEP5_EXECUTOR_SCRIPT_PATH: /workspace/scripts/auto_issue_executor.py
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      localstack:
        condition: service_healthy
      github-mcp:
        condition: service_started
    restart: unless-stopped
    volumes:
      - ./:/workspace

  order-consumer:
    build:
      context: ./order-consumer
      dockerfile: Dockerfile
    container_name: learning-order-consumer
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/learning_orders?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: appuser
      SPRING_DATASOURCE_PASSWORD: apppass
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      APP_QUEUE_NAME: order.submitted.queue
      APP_EXCHANGE_NAME: learning.order.exchange
      APP_ROUTING_KEY: order.submitted
    restart: unless-stopped

  order-ui:
    build:
      context: ./order-ui
      dockerfile: Dockerfile
    container_name: learning-order-ui
    pull_policy: build
    environment:
      API_PROXY_TARGET: http://order-api:8080
    ports:
      - "8081:80"
    depends_on:
      order-api:
        condition: service_started
    restart: unless-stopped
