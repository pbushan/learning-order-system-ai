spring:
  application:
    name: order-api
  datasource:
    url: jdbc:mysql://localhost:3306/learning_orders?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: appuser
    password: apppass
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true
  rabbitmq:
    host: localhost
    port: 5672
  docker:
    compose:
      enabled: true
      lifecycle-management: start_only
app:
  rabbit:
    exchange-name: learning.order.exchange
    queue-name: order.submitted.queue
    routing-key: order.submitted
  lambda:
    endpoint: http://localhost:4566
    region: us-east-1
    function-name: shipping-rule-lambda
  intake:
    openai:
      api-key: ${OPENAI_API_KEY:}
    model: gpt-4.1-mini
    decomposition:
      model: ${app.intake.model:gpt-4.1-mini}
      max-subtasks: 5
    audit-log-path: order-api/audit/intake-chat.jsonl
  github:
    token: ${APP_GITHUB_TOKEN:}
    provider: ${APP_GITHUB_PROVIDER:mcp}
    mcp-base-url: ${APP_GITHUB_MCP_BASE_URL:http://github-mcp:8082}
    repository: ${APP_GITHUB_REPOSITORY:pbushan/learning-order-system-ai}
    owner: pbushan
    repo: learning-order-system-ai
  step6:
    enabled: ${APP_STEP6_ENABLED:true}
    poll-interval-ms: ${APP_STEP6_POLL_INTERVAL_MS:30000}
    initial-delay-ms: ${APP_STEP6_INITIAL_DELAY_MS:10000}
    max-cycles-per-pr: ${APP_STEP6_MAX_CYCLES_PER_PR:3}
    max-self-review-attempts: ${APP_STEP6_MAX_SELF_REVIEW_ATTEMPTS:1}
    wait-cycles-before-self-review: ${APP_STEP6_WAIT_CYCLES_BEFORE_SELF_REVIEW:2}
