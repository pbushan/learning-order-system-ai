spring:
  application:
    name: order-api
  datasource:
    url: jdbc:mysql://localhost:3306/learning_orders?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: appuser
    password: apppass
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true
  rabbitmq:
    host: localhost
    port: 5672
  docker:
    compose:
      enabled: true
      lifecycle-management: start_only
app:
  rabbit:
    exchange-name: learning.order.exchange
    queue-name: order.submitted.queue
    routing-key: order.submitted
  lambda:
    endpoint: http://localhost:4566
    region: us-east-1
    function-name: shipping-rule-lambda
  intake:
    openai:
      api-key: ${OPENAI_API_KEY:}
    model: gpt-4.1-mini
    decomposition:
      model: ${app.intake.model:gpt-4.1-mini}
      max-subtasks: 5
    audit-log-path: order-api/audit/intake-chat.jsonl
